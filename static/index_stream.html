<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Eli's Live Trading Review</title>
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080b10;
      --panel: #0f151f;
      --panel-2: #131b27;
      --border: #253246;
      --muted: #8f9caf;
      --text: #e9eef6;
      --accent: #6da8ff;
      --good: #69d69c;
      --warn: #e7bd68;
      --bad: #ef8181;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 50% -20%, #142135 0, var(--bg) 42%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-width: 1100px;
    }
    .header {
      padding: 18px 22px 15px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      background: rgba(10, 15, 23, .88);
    }
    .title {
      font-size: 22px;
      font-weight: 750;
      letter-spacing: -.025em;
    }
    .subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-top: 5px;
    }
    .header-tools, .timeframe-group, .status-group {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .header-tools {
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .status {
      font-size: 12px;
      color: var(--muted);
    }
    .status-pill {
      padding: 5px 9px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #111a27;
      color: #b8c5d8;
      white-space: nowrap;
    }
    .status-pill.connected {
      border-color: rgba(105, 214, 156, .45);
      color: var(--good);
      background: rgba(35, 90, 66, .24);
    }
    .status-pill.reconnecting {
      border-color: rgba(231, 189, 104, .45);
      color: var(--warn);
    }
    .chart-shell { position: relative; background: #0c1119; }
    #chart {
      width: 100%;
      height: 640px;
    }
    .brand-watermark {
      position: absolute;
      left: 14px;
      bottom: 36px;
      z-index: 1;
      color: #eef3f8;
      opacity: .25;
      font-size: clamp(34px, 3vw, 42px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -1px;
      pointer-events: none;
      user-select: none;
    }
    .chart-empty {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
      background: radial-gradient(circle, rgba(16, 24, 35, .78), rgba(10, 14, 21, .32) 42%, transparent 70%);
      z-index: 2;
    }
    .chart-empty.visible { display: flex; }
    .chart-empty strong { display: block; font-size: 17px; margin-bottom: 7px; }
    .chart-empty span { color: var(--muted); font-size: 13px; }
    .legend-wrap {
      border-top: 1px solid var(--border);
      padding: 14px 18px 18px;
      background: #0b1017;
    }
    .legend {
      display: grid;
      grid-template-columns: repeat(5, minmax(190px, 1fr));
      gap: 10px;
      font-size: 12px;
    }
    .legend-group {
      min-width: 0;
      padding: 10px;
      border: 1px solid #202c3d;
      border-radius: 10px;
      background: #0f1621;
    }
    .legend-group-title {
      display: block;
      color: #77869a;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .09em;
      text-transform: uppercase;
      margin: 0 0 8px 2px;
    }
    .legend-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .legend-group.warnings { border-color: rgba(231, 189, 104, .28); }
    .legend-group.setup { border-color: rgba(109, 168, 255, .3); }
    .pill.alert {
      border-color: rgba(239, 129, 129, .5);
      color: #f2a0a0;
      background: rgba(91, 38, 42, .25);
    }
    .pill.caution {
      border-color: rgba(231, 189, 104, .45);
      color: var(--warn);
    }
    .pill {
      padding: 5px 8px;
      border-radius: 999px;
      background: #151e2b;
      border: 1px solid #2a384c;
      color: #c5cfdd;
      line-height: 1.25;
    }
    .error {
      color: var(--bad);
      padding: 0 18px 14px;
      font-size: 12px;
    }
    .tf-btn {
      background: #121a26;
      color: #aeb9c9;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px 9px;
      cursor: pointer;
      font-weight: 650;
    }
    .tf-btn.active {
      background: #203652;
      border-color: #6595cf;
      color: #ffffff;
    }
    button { transition: background .15s ease, border-color .15s ease, opacity .15s ease; }
    button:hover { border-color: #506781; }
    .toggle-row {
      padding: 9px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      background: #0d131c;
    }
    .toggle-label {
      color: #78879a;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin: 0 3px 0 8px;
    }
    .toggle-btn {
      background: #121a25;
      color: #aeb9c9;
      border: 1px solid #263448;
      border-radius: 999px;
      padding: 5px 8px;
      cursor: pointer;
      font-size: 11px;
    }
    .toggle-btn.active {
      background: #1c2e45;
      border-color: #4e7199;
      color: #dbe9fa;
    }
    .toggle-btn.clean-mode-suppressed {
      opacity: 0.35;
      border-style: dashed;
    }
    .clean-mode-btn {
      background: #19372b;
      border-color: #4ca879;
      color: #ffffff;
      font-weight: 700;
      padding: 6px 11px;
      margin-right: 3px;
    }
    .clean-mode-btn:not(.active) {
      background: #1b2230;
      border-color: #2d3545;
      color: #aeb9c9;
    }
</style>
</head>
<body>
  <div class="header">
    <div>
      <div class="title">Eli's Live Trading Review</div>
      <div class="subtitle">Professional multi-context chart review · AAPL · Eastern Time</div>
    </div>
    <div class="header-tools">
      <div class="timeframe-group">
        <button class="tf-btn active" data-tf="1Min">1m</button>
        <button class="tf-btn" data-tf="5Min">5m</button>
        <button class="tf-btn" data-tf="15Min">15m</button>
      </div>
      <div class="status-group">
        <span class="status status-pill" id="status">Loading chart</span>
        <span class="status status-pill" id="countdown">Next 1m candle: --:--</span>
        <span class="status status-pill" id="streamStatus">Stream connecting</span>
        <span class="status status-pill">Read-only</span>
      </div>
    </div>
  </div>


  <div class="toggle-row">
    <button class="toggle-btn clean-mode-btn active" id="cleanModeToggle" type="button" aria-pressed="true">Clean Mode: On</button>
    <span class="toggle-label">Core Layers</span>
    <button class="toggle-btn active" data-layer="premarket">PMH/PML</button>
    <button class="toggle-btn active" data-layer="previousDay">PDH/PDL/PDC</button>
    <button class="toggle-btn active" data-layer="vwap">VWAP</button>
    <button class="toggle-btn active" data-layer="emas">EMA9/EMA20</button>
    <span class="toggle-label">Structure</span>
    <button class="toggle-btn active" data-layer="sr">Support/Resistance</button>
    <button class="toggle-btn active" data-layer="supplyDemand">Supply/Demand</button>
    <button class="toggle-btn" data-layer="weakZones">Weak Zones</button>
    <button class="toggle-btn active" data-layer="liquiditySweeps">Liquidity Sweeps</button>
    <button class="toggle-btn active" data-layer="clusters">Clusters</button>
    <button class="toggle-btn active" data-layer="reactionZones">Reaction Zones</button>
    <span class="toggle-label">Setups</span>
    <button class="toggle-btn active" data-layer="confirmationSetups">Confirmation Setups</button>
  </div>

  <div class="chart-shell">
    <div id="chart"></div>
    <div class="brand-watermark" aria-hidden="true">E$</div>
    <div id="chartEmpty" class="chart-empty">
      <div><strong>Waiting for market data</strong><span>Market may be closed or no live candles available</span></div>
    </div>
  </div>
  <div class="legend-wrap">
    <div class="legend" id="legend"></div>
  </div>
  <div class="error" id="error"></div>

  <script src="/app_stream.js?v=stream30"></script>
</body>
</html>
