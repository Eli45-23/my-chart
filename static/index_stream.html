<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Eli's Live Trading Review</title>
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070b11;
      --panel: #0c121b;
      --panel-2: #101824;
      --border: #202c3b;
      --muted: #8491a3;
      --text: #e2e8f0;
      --accent: #7097c5;
      --good: #65b9a6;
      --warn: #c9a65d;
      --bad: #d77979;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-width: 1100px;
    }
    .header {
      padding: 12px 18px 11px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      background: #0a1018;
    }
    .title {
      font-size: 19px;
      font-weight: 750;
      letter-spacing: -.025em;
    }
    .subtitle {
      color: var(--muted);
      font-size: 11px;
      margin-top: 3px;
    }
    .header-tools, .timeframe-group, .status-group {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .symbol-group {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .symbol-input {
      width: 76px;
      padding: 5px 7px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #101823;
      color: var(--text);
      font: inherit;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      outline: none;
    }
    .symbol-input:focus { border-color: #58779b; }
    .symbol-load-btn {
      padding: 5px 8px;
      border: 1px solid #425f7e;
      border-radius: 6px;
      background: #172638;
      color: #cbd9e8;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
    }
    .header-tools {
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .status {
      font-size: 11px;
      color: var(--muted);
    }
    .status-pill {
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #101823;
      color: #aeb9c8;
      white-space: nowrap;
    }
    .status-pill.connected {
      border-color: rgba(101, 185, 166, .4);
      color: var(--good);
      background: rgba(38, 84, 72, .2);
    }
    .status-pill.reconnecting {
      border-color: rgba(201, 166, 93, .38);
      color: var(--warn);
    }
    .chart-shell { position: relative; background: #090e15; }
    #chart {
      width: 100%;
      height: clamp(610px, 69vh, 760px);
    }
    .brand-watermark {
      position: absolute;
      left: 18px;
      bottom: 34px;
      z-index: 1;
      color: #eef3f8;
      opacity: .13;
      font-size: clamp(32px, 2.8vw, 40px);
      font-weight: 850;
      line-height: 1;
      letter-spacing: -1px;
      pointer-events: none;
      user-select: none;
    }
    .chart-empty {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
      background: radial-gradient(circle, rgba(16, 24, 35, .78), rgba(10, 14, 21, .32) 42%, transparent 70%);
      z-index: 2;
    }
    .chart-empty.visible { display: flex; }
    .chart-empty strong { display: block; font-size: 17px; margin-bottom: 7px; }
    .chart-empty span { color: var(--muted); font-size: 13px; }
    .legend-wrap {
      border-top: 1px solid var(--border);
      padding: 9px 12px 12px;
      background: #080d14;
    }
    .legend {
      display: grid;
      grid-template-columns: repeat(5, minmax(190px, 1fr));
      gap: 7px;
      font-size: 11px;
    }
    .legend-group {
      min-width: 0;
      padding: 8px;
      border: 1px solid #1c2836;
      border-radius: 8px;
      background: #0c131d;
    }
    .legend-group-title {
      display: block;
      color: #738196;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .09em;
      text-transform: uppercase;
      margin: 0 0 6px 2px;
    }
    .legend-pills { display: flex; flex-wrap: wrap; gap: 4px; }
    .legend-group.warnings { border-color: rgba(231, 189, 104, .28); }
    .legend-group.setup { border-color: rgba(109, 168, 255, .3); }
    .pill.alert {
      border-color: rgba(215, 121, 121, .38);
      color: #d99292;
      background: rgba(82, 38, 42, .2);
    }
    .pill.caution {
      border-color: rgba(201, 166, 93, .36);
      color: var(--warn);
    }
    .pill {
      padding: 4px 7px;
      border-radius: 999px;
      background: #111a26;
      border: 1px solid #263447;
      color: #b9c4d2;
      line-height: 1.25;
    }
    .error {
      color: var(--bad);
      padding: 0 18px 14px;
      font-size: 12px;
    }
    .tf-btn {
      background: #121a26;
      color: #aeb9c9;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 8px;
      cursor: pointer;
      font-weight: 650;
    }
    .tf-btn.active {
      background: #1b2b40;
      border-color: #58779b;
      color: #e5edf6;
    }
    button { transition: background .15s ease, border-color .15s ease, opacity .15s ease; }
    button:hover { border-color: #506781; }
    .toggle-row {
      padding: 6px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
      background: #0b1119;
    }
    .toggle-label {
      color: #78879a;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin: 0 4px 0 9px;
    }
    .toggle-btn {
      background: #121a25;
      color: #aeb9c9;
      border: 1px solid #263448;
      border-radius: 6px;
      padding: 4px 7px;
      cursor: pointer;
      font-size: 10px;
    }
    .toggle-btn.active {
      background: #172638;
      border-color: #425f7e;
      color: #cbd9e8;
    }
    .toggle-btn.clean-mode-suppressed {
      opacity: 0.35;
      border-style: dashed;
    }
    .clean-mode-btn {
      background: #163128;
      border-color: #458d70;
      color: #dcefe8;
      font-weight: 700;
      padding: 5px 9px;
      margin-right: 3px;
    }
    .clean-mode-btn:not(.active) {
      background: #1b2230;
      border-color: #2d3545;
      color: #aeb9c9;
    }
</style>
</head>
<body>
  <div class="header">
    <div>
      <div class="title" id="chartTitle">AAPL Live Trading Review</div>
      <div class="subtitle" id="chartSubtitle">AAPL · Read-only AI-assisted chart review · Eastern Time</div>
    </div>
    <div class="header-tools">
      <div class="symbol-group">
        <input class="symbol-input" id="symbolInput" type="text" value="AAPL" placeholder="Symbol" maxlength="10" aria-label="Chart symbol" />
        <button class="symbol-load-btn" id="loadSymbolButton" type="button">Load</button>
      </div>
      <div class="timeframe-group">
        <button class="tf-btn active" data-tf="1Min">1m</button>
        <button class="tf-btn" data-tf="5Min">5m</button>
        <button class="tf-btn" data-tf="15Min">15m</button>
      </div>
      <div class="status-group">
        <span class="status status-pill" id="status">Loading chart</span>
        <span class="status status-pill" id="countdown">Next 1m candle: --:--</span>
        <span class="status status-pill" id="streamStatus">Stream connecting</span>
        <span class="status status-pill">Read-only</span>
      </div>
    </div>
  </div>


  <div class="toggle-row">
    <button class="toggle-btn clean-mode-btn active" id="cleanModeToggle" type="button" aria-pressed="true">Clean Mode: On</button>
    <span class="toggle-label">Core Layers</span>
    <button class="toggle-btn active" data-layer="premarket">PMH/PML</button>
    <button class="toggle-btn active" data-layer="previousDay">PDH/PDL/PDC</button>
    <button class="toggle-btn active" data-layer="vwap">VWAP</button>
    <button class="toggle-btn active" data-layer="emas">EMA9/EMA20</button>
    <span class="toggle-label">Structure</span>
    <button class="toggle-btn active" data-layer="sr">Support/Resistance</button>
    <button class="toggle-btn active" data-layer="supplyDemand">Supply/Demand</button>
    <button class="toggle-btn" data-layer="weakZones">Weak Zones</button>
    <button class="toggle-btn active" data-layer="liquiditySweeps">Liquidity Sweeps</button>
    <button class="toggle-btn active" data-layer="clusters">Clusters</button>
    <button class="toggle-btn active" data-layer="reactionZones">Reaction Zones</button>
    <span class="toggle-label">Setups</span>
    <button class="toggle-btn active" data-layer="confirmationSetups">Confirmation Setups</button>
  </div>

  <div class="chart-shell">
    <div id="chart"></div>
    <div class="brand-watermark" aria-hidden="true">E$</div>
    <div id="chartEmpty" class="chart-empty">
      <div><strong>Waiting for market data</strong><span>Market may be closed or no live candles are available.</span></div>
    </div>
  </div>
  <div class="legend-wrap">
    <div class="legend" id="legend"></div>
  </div>
  <div class="error" id="error"></div>

  <script src="/app_stream.js?v=stream35"></script>
</body>
</html>
